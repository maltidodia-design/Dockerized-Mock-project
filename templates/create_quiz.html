<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Create Quiz</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="container">
      <h1>Create Quiz</h1>
      <form method="post">
        <label>Title<br><input name="title" required></label>
        <p>
        <label>Questions (JSON)<br>
        <textarea name="questions" rows="15" cols="80">{{ sample }}</textarea>
        </label>
        </p>
        <p><button type="submit">Create</button> <a href="/">Cancel</a></p>
      </form>
      <p>Question format: [{"text":"...","choices":["a","b"],"answer_index":0}, ...]</p>
    </div>
  </body>
</html>
