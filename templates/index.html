<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quiz MVP</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="container">
      <h1>AI-Powered Quiz — MVP</h1>
      <p><a href="/create">Create a new quiz</a></p>
      <h2>Available quizzes</h2>
      <ul>
        {% for q in quizzes %}
          <li><strong>{{ q.title }}</strong> — <a href="/take/{{ q.id }}">Take quiz</a></li>
        {% else %}
          <li>No quizzes yet</li>
        {% endfor %}
      </ul>
    </div>
  </body>
</html>
