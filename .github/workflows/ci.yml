name: CI

on:
  push:
    branches: [ main, Tests-and-validation ]
  pull_request:
    branches: [ main, Tests-and-validation ]

jobs:
  test:
    name: Unit, Integration, E2E & Specialized Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit + integration tests
        run: |
          pytest tests/ \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_security.py \
            --ignore=tests/test_a11y_extended.py \
            --ignore=tests/test_ai_safety.py \
            --ignore=tests/test_performance.py \
            -v
      - name: Run E2E tests (real server over HTTP)
        run: |
          pytest tests/test_e2e.py -v
      - name: Run specialized tests (security + a11y + AI safety + perf)
        run: |
          pytest \
            tests/test_security.py \
            tests/test_a11y_extended.py \
            tests/test_ai_safety.py \
            tests/test_performance.py \
            -v
      - name: Install scanners (Bandit SAST + pip-audit SCA)
        run: |
          python -m pip install bandit pip-audit
      - name: Run Bandit (SAST)
        run: |
          # B104 = bind to all interfaces; intentional for the Docker artifact
          # (`gunicorn -b 0.0.0.0:8000`) and the test live-server fixture.
          bandit -r app.py db_init.py tests/e2e_server.py --skip B104 -ll
      - name: Run pip-audit (dependency CVEs)
        run: |
          # Audit the project's declared runtime requirements (not the whole
          # venv, which would also flag CVEs in CI-only tools like bandit/
          # pip-audit themselves). --strict fails the step on any finding.
          pip-audit --strict --requirement requirements.txt

