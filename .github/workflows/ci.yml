name: CI

on:
  push:
    branches: [ main, Tests-and-validation ]
  pull_request:
    branches: [ main, Tests-and-validation ]

jobs:
  test:
    name: Unit, Integration, E2E & Specialized Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit + integration tests
        run: |
          pytest tests/ \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_security.py \
            --ignore=tests/test_a11y_extended.py \
            -v
      - name: Run E2E tests (real server over HTTP)
        run: |
          pytest tests/test_e2e.py -v
      - name: Run specialized tests (security + extended a11y)
        run: |
          pytest tests/test_security.py tests/test_a11y_extended.py -v

